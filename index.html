<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クマ出没情報マップ（モック）</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- ヘッダー: サービス名 + データ更新時刻（P1: 鮮度の明示） -->
  <header class="app-header">
    <h1 class="app-title">クマ出没情報マップ</h1>
    <span id="last-updated" class="last-updated" title="">更新: --</span>
  </header>

  <!-- マップ領域 -->
  <main id="map" class="map-container" aria-label="クマ出没情報マップ"></main>

  <!-- 状態表示カード（S1/S3/S4 で使用、初期は非表示） -->
  <div id="status-card" class="status-card" hidden>
    <p id="status-message"></p>
    <button id="status-reload" class="status-reload" hidden>再読み込み</button>
    <a id="status-official-link" class="status-official-link"
       href="https://www.pref.akita.lg.jp/pages/archive/23295"
       target="_blank" rel="noopener" hidden>自治体の公式情報を確認する</a>
  </div>

  <!-- 免責フッター: 常時固定表示（要件 3.1 / P4）+ CC-BY-4.0 の出典表示 -->
  <footer class="disclaimer">
    ⚠ 本情報は収集・変換の性質上、遅延・誤りを含む場合があります。緊急時は
    <a href="https://www.pref.akita.lg.jp/pages/archive/23295" target="_blank" rel="noopener">自治体等の公式情報</a>
    をご確認ください。<br>
    出典: 秋田県「ツキノワグマ等情報マップシステム『クマダス』」（
    <a href="https://ckan.pref.akita.lg.jp/dataset/050008_shizenhogoka_003" target="_blank" rel="noopener">秋田県オープンデータカタログ</a>、
    <a href="https://creativecommons.org/licenses/by/4.0/deed.ja" target="_blank" rel="noopener">CC-BY-4.0</a> ）
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/app.js"></script>
</body>
</html>
